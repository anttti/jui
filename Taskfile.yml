version: '3'

vars:
  BINARY: jira
  PKG: ./...
  COVERAGE: coverage.out
  COVERAGE_HTML: coverage.html

tasks:
  default:
    desc: Build the app
    cmds:
      - task: build

  build:
    desc: Build the jira binary into the repo root
    cmds:
      - go build -o {{.BINARY}} .
    sources:
      - '**/*.go'
      - go.mod
      - go.sum
    generates:
      - '{{.BINARY}}'

  run:
    desc: Build and run the app
    deps: [build]
    cmds:
      - ./{{.BINARY}} {{.CLI_ARGS}}

  test:
    desc: Run tests
    cmds:
      - go test {{.PKG}}

  cover:
    desc: Run tests with coverage and print a per-function summary
    cmds:
      - go test -coverprofile={{.COVERAGE}} -covermode=atomic {{.PKG}}
      - go tool cover -func={{.COVERAGE}}

  cover:html:
    desc: Generate an HTML coverage report at coverage.html
    deps: [cover]
    cmds:
      - go tool cover -html={{.COVERAGE}} -o {{.COVERAGE_HTML}}

  vet:
    desc: Run go vet
    cmds:
      - go vet {{.PKG}}

  tidy:
    desc: Tidy go.mod / go.sum
    cmds:
      - go mod tidy

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -f {{.BINARY}}
      - rm -f {{.COVERAGE}} {{.COVERAGE_HTML}}
      - rm -rf dist
